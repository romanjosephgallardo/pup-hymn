<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <title>The PUP Hymn</title>

</head>
<body>
    <!-- Title Modal -->
    <!-- <div class="title-content">
        <img src="assets/images/pup_logo.png" alt="PUP Logo" class="pup-logo">
        <h3 class="pup-full-name"> Polytechnic University of the Philippines </h3>
        <h1 class="main-title">PUP Hymn</h1>
        <div class="divider"></div>
        <h2 class="main-subtitle"> "Mula sa'yo, para sa bayan" </h2>
        <button class="listen-btn"> Listen Now </button>
    </div> -->

    <!-- Music Player Section -->
    <div class="music-player">
        <!-- CD Container -->
        <div class="cd-container">
            <!-- Vinyl Art -->
            <!-- From Uiverse.io by TheAbieza --> 
            <div class="container">
                <div class="plate">
                    <div class="black">
                        <div class="border">
                            <div class="white">
                                <img src="/assets/images/pup_logo.png" class="center-img">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="player">
                    <div class="rect"></div>
                    <div class="circ"></div>
                </div>
            </div>

            <div class="song-info">
                <h2 class="song-title">The PUP Hymn (Imno ng PUP)</h2>
                <p class="artist-name">S. Calabig, S. Rolda, and R. Amaranto</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill">
                    <div class="progress-thumb"></div>
                    </div>
                </div>

                <div class="time-row">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">1:52</span>
                </div>
            </div>

            <!-- Audio Element -->
            <audio id="pupAudio" >
                <source src="/assets/mp3/imno_ng_pup.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <!-- Lyric Box -->
        <div class="lyrics-container">
            <div class="lyric-box">
                <p> Lyrics here </p>
            </div>
        </div>
    </div>
</body>
</html>
